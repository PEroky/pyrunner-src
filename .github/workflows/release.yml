name: Build Release Binaries

on:
  push:
    branches: [main]
    paths:
      - "*.go"
      - "go.*"
      - "index.html"
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create date tag
        id: tag
        run: |
          VERSION="v$(date -u +'%Y%m%d.%H%M')"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          git tag "${VERSION}"
          git push origin "${VERSION}"
          echo "Tagged: ${VERSION}"

  build:
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${{ needs.tag.outputs.version }}
          OUTPUT="pyrunner-${VERSION}-${{ matrix.suffix }}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "${OUTPUT}" .
          sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"
          echo "OUTPUT=${OUTPUT}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyrunner-${{ matrix.suffix }}
          path: |
            pyrunner-*-${{ matrix.suffix }}
            pyrunner-*-${{ matrix.suffix }}.sha256

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          cat *.sha256 > ../checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          generate_release_notes: true
          files: |
            dist/pyrunner-*
            checksums.txt
