<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyRunner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
head,head *,style{display:none!important}

:root,html[data-theme="dark"]{
  --bg:#0f1117;--surface:#1a1b26;--surface2:#24253a;--border:#2f3146;
  --text:#c0caf5;--text2:#565f89;--accent:#7aa2f7;--green:#9ece6a;
  --red:#f7768e;--yellow:#e0af68;--terminal-bg:#000;--terminal-fg:#d4d4d4;
  --font:'SF Mono',SFMono-Regular,ui-monospace,'DejaVu Sans Mono',Menlo,Consolas,monospace;
  --modal-overlay:rgba(0,0,0,.6);--badge-run-bg:rgba(122,162,247,.15);
  --badge-ok-bg:rgba(158,206,106,.15);--badge-err-bg:rgba(247,118,142,.15);
  --badge-stop-bg:rgba(224,175,104,.15)
}

html[data-theme="light"]{
  --bg:#f5f5f5;--surface:#fff;--surface2:#e8e8e8;--border:#d0d0d0;
  --text:#24292e;--text2:#6a737d;--accent:#0366d6;--green:#22863a;
  --red:#cb2431;--yellow:#b08800;--terminal-bg:#1e1e1e;--terminal-fg:#d4d4d4;
  --modal-overlay:rgba(0,0,0,.3);--badge-run-bg:rgba(3,102,214,.1);
  --badge-ok-bg:rgba(34,134,58,.1);--badge-err-bg:rgba(203,36,49,.1);
  --badge-stop-bg:rgba(176,136,0,.1)
}

html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

.app{display:flex;height:100vh}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h1{font-size:15px;font-weight:600;color:var(--accent)}
.btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
html[data-theme="dark"] .btn-primary{color:#1a1b26}
.btn-primary:hover{opacity:.85}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:3px 8px;font-size:11px}

.script-list{flex:1;overflow-y:auto;padding:6px}
.script-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:all .12s;display:flex;align-items:center;gap:8px}
.script-item:hover{background:var(--surface2)}
.script-item.active{background:var(--surface2);border-left:2px solid var(--accent)}
.script-item .name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.script-item .desc{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.running{background:var(--accent);animation:pulse 1.5s infinite}
.status-dot.success{background:var(--green)}
.status-dot.failed,.status-dot.error{background:var(--red)}
.status-dot.stopped{background:var(--yellow)}
.status-dot.none{background:var(--text2);opacity:.3}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.main-header{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);min-height:44px}
.main-header .title{font-size:14px;font-weight:500;flex:1}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 16px}
.tab{padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-content{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 16px}

.editor-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
.editor-wrap textarea{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:var(--font);font-size:13px;line-height:1.6;resize:none;outline:none;min-height:0}
.editor-wrap textarea:focus{border-color:var(--accent)}
.editor-bar{padding:8px 0 0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.save-indicator{font-size:11px;color:var(--text2);transition:opacity .3s}

.output-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
.output-bar{margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.terminal{background:var(--terminal-bg);color:var(--terminal-fg);font-family:var(--font);font-size:13px;line-height:1.5;padding:10px;border-radius:6px;flex:1;overflow:auto;white-space:pre-wrap;word-break:break-all;min-height:0}

/* xterm terminal container */
.xterm-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
.xterm-wrap .xterm{flex:1}

.modal-overlay{position:fixed;inset:0;background:var(--modal-overlay);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:400px;max-width:90vw}
.modal h2{font-size:15px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.form-group label{font-size:12px;color:var(--text2)}
.form-group input{padding:6px 10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none}
.form-group input:focus{border-color:var(--accent)}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:10px}
.empty svg{opacity:.3}
.empty p{font-size:13px}

.sidebar-footer{padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}

.pip-bar{display:flex;gap:8px;margin-bottom:12px;flex-shrink:0}
.pip-bar input{flex:1;padding:7px 10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none}
.pip-bar input:focus{border-color:var(--accent)}
.pkg-table{width:100%;border-collapse:collapse;font-size:13px}
.pkg-table th{text-align:left;padding:6px 10px;color:var(--text2);border-bottom:1px solid var(--border);font-weight:500;position:sticky;top:0;background:var(--bg)}
.pkg-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.pkg-table tr:hover td{background:var(--surface)}
.pkg-count{font-size:11px;color:var(--text2)}

.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:340px;max-width:90vw}
.login-box h1{font-size:18px;text-align:center;margin-bottom:20px;color:var(--accent)}
.login-box .form-group{margin-bottom:14px}
.login-box .form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.login-box .form-group input{width:100%;padding:9px 12px;font-size:13px}
.login-box .login-btn{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
html[data-theme="dark"] .login-box .login-btn{color:#1a1b26}
.login-box .login-btn:hover{opacity:.85}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none}

.theme-toggle{background:none;border:none;cursor:pointer;font-size:16px;padding:2px;line-height:1}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}
script{display:none!important}
</style>
</head>
<body>
<div class="login-wrap" id="loginPage" style="display:none">
  <div class="login-box">
    <h1>🐍 PyRunner</h1>
    <div class="form-group"><label>用户名</label><input id="loginUser" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()"></div>
    <div class="form-group"><label>密码</label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError">用户名或密码错误</div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>🐍 PyRunner</h1>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" id="themeBtn">🌙</button>
        <button class="btn btn-primary btn-sm" onclick="showNewModal()">+ 新建</button>
      </div>
    </div>
    <div class="script-list" id="scriptList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-sm" style="width:100%" onclick="showPipManager()">📦 包管理</button>
      <button class="btn btn-sm" style="width:100%" onclick="showTerminal()">🖥️ 终端</button>
      <button class="btn btn-sm" id="logoutBtn" style="width:100%;display:none" onclick="doLogout()">🚪 退出</button>
    </div>
  </div>
  <div class="main" id="mainArea">
    <div class="empty" style="height:100%">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      <p>选择脚本或点击 <b>+ 新建</b></p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">新建脚本</h2>
    <div class="form-group"><label>名称</label><input id="modalName" placeholder="my_script"></div>
    <div class="form-group"><label>描述</label><input id="modalDesc" placeholder="可选"></div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalSubmit" onclick="submitModal()">创建</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
const API='/api', MAX_TERM_LINES=50;
let scripts=[],activeScript=null,activeTab='editor',streamSource=null,viewingRunId=null,authEnabled=false;
let autoSaveTimer=null, lastSavedContent=null;
let xtermObj=null, xtermWS=null, fitAddon=null;

// --- Theme ---
function initTheme(){
  const t=localStorage.getItem('pyrunner_theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
  applyTheme(t);
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('pyrunner_theme',t);
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=t==='dark'?'\u2600\uFE0F':'\uD83C\uDF19';
}
function toggleTheme(){
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
}
initTheme();

// --- API ---
async function api(p,o={}){
  const r=await fetch(API+p,{headers:{'Content-Type':'application/json'},...o,body:o.body?JSON.stringify(o.body):undefined});
  if(r.status===401){showLogin();throw new Error('Unauthorized');}
  return r.json();
}

// --- Scripts ---
async function loadScripts(){scripts=await api('/scripts');renderScriptList();}

function renderScriptList(){
  const el=document.getElementById('scriptList');
  if(!scripts.length){el.innerHTML='<div style="padding:16px;text-align:center;color:var(--text2);font-size:12px">暂无脚本</div>';return;}
  el.innerHTML=scripts.map(s=>`
    <div class="script-item ${activeScript&&activeScript.id===s.id?'active':''}" onclick="selectScript(${s.id})">
      <div class="status-dot ${s.last_status||'none'}"></div>
      <div style="flex:1;min-width:0">
        <div class="name">${esc(s.name)}</div>
        ${s.description?`<div class="desc">${esc(s.description)}</div>`:''}
      </div>
    </div>`).join('');
}

async function selectScript(id){
  if(streamSource){streamSource.close();streamSource=null;}
  cleanupXterm();
  activeScript=await api(`/scripts/${id}`);
  lastSavedContent=activeScript.content||'';
  activeTab='editor';viewingRunId=null;
  renderScriptList();renderMain();
}

function renderMain(){
  if(!activeScript)return;
  const isRunning=scripts.find(s=>s.id===activeScript.id)?.last_status==='running';
  const a=document.getElementById('mainArea');
  a.innerHTML=`
    <div class="main-header">
      <div class="title">${esc(activeScript.name)}.py</div>
      <button class="btn btn-sm" onclick="showEditModal()">✏️ 编辑</button>
      <button class="btn btn-sm btn-primary" onclick="runScript()">▶ 运行</button>
      ${isRunning?'<button class="btn btn-sm btn-danger" onclick="stopCurrentRun()">⏹ 停止</button>':''}
      <button class="btn btn-sm btn-danger" onclick="deleteScript()">删除</button>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='editor'?'active':''}" onclick="swTab('editor')">代码</div>
      <div class="tab ${activeTab==='output'?'active':''}" onclick="swTab('output')">输出</div>
    </div>
    <div class="tab-content" id="tabContent"></div>`;
  renderTab();
}

function swTab(t){activeTab=t;renderMain();}

function renderTab(){
  const tc=document.getElementById('tabContent');
  if(!tc)return;
  if(activeTab==='editor'){
    tc.innerHTML=`<div class="editor-wrap"><textarea id="codeEditor" spellcheck="false">${esc(activeScript.content||'')}</textarea><div class="editor-bar"><span class="save-indicator" id="saveIndicator"></span><button class="btn btn-primary" onclick="saveCode()">💾 保存</button></div></div>`;
    const ed=document.getElementById('codeEditor');
    ed.addEventListener('keydown',e=>{
      if(e.key==='Tab'){e.preventDefault();const s=ed.selectionStart;ed.value=ed.value.substring(0,s)+'    '+ed.value.substring(ed.selectionEnd);ed.selectionStart=ed.selectionEnd=s+4;}
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCode();}
    });
    ed.addEventListener('input',()=>scheduleAutoSave());
  }else if(activeTab==='output'){
    tc.innerHTML=`<div class="output-wrap"><div class="output-bar"><span id="outputStatus" style="font-size:12px;color:var(--text2)">无输出</span><span style="flex:1"></span><button class="btn btn-sm btn-danger" id="stopBtn" style="display:none" onclick="stopCurrentRun()">⏹ 停止</button></div><div class="terminal" id="terminal"></div></div>`;
    loadLatestOutput();
  }
}

// --- Auto Save ---
function scheduleAutoSave(){
  const ind=document.getElementById('saveIndicator');
  if(ind){ind.textContent='未保存';ind.style.color='var(--yellow)';}
  if(autoSaveTimer)clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>doAutoSave(),1500);
}

async function doAutoSave(){
  if(!activeScript)return;
  const ed=document.getElementById('codeEditor');
  if(!ed)return;
  const content=ed.value;
  if(content===lastSavedContent)return;
  try{
    await api(`/scripts/${activeScript.id}/content`,{method:'PATCH',body:{content}});
    lastSavedContent=content;
    activeScript.content=content;
    const ind=document.getElementById('saveIndicator');
    if(ind){ind.textContent='已自动保存';ind.style.color='var(--green)';setTimeout(()=>{if(ind.textContent==='已自动保存')ind.textContent='';},2000);}
  }catch(e){console.error('auto-save failed',e);}
}

function stxt(s){return{running:'运行中',success:'成功',failed:'失败',error:'失败',stopped:'已停止'}[s]||s;}

async function saveCode(){
  if(autoSaveTimer){clearTimeout(autoSaveTimer);autoSaveTimer=null;}
  const c=document.getElementById('codeEditor').value;
  await api(`/scripts/${activeScript.id}`,{method:'PUT',body:{name:activeScript.name,description:activeScript.description,content:c}});
  activeScript.content=c;lastSavedContent=c;
  const ind=document.getElementById('saveIndicator');
  if(ind){ind.textContent='已保存';ind.style.color='var(--green)';setTimeout(()=>{if(ind.textContent==='已保存')ind.textContent='';},2000);}
  showToast('已保存');
}

// --- Run / Output ---
async function runScript(){
  // Auto-save before running
  const ed=document.getElementById('codeEditor');
  if(ed&&ed.value!==lastSavedContent){
    await api(`/scripts/${activeScript.id}/content`,{method:'PATCH',body:{content:ed.value}});
    activeScript.content=ed.value;lastSavedContent=ed.value;
  }
  const res=await api(`/scripts/${activeScript.id}/run`,{method:'POST'});
  if(res.error){alert(res.error);return;}
  viewingRunId=res.run_id;
  activeTab='output';
  renderMain();
  startStream(res.run_id);
  loadScripts();
}

async function loadLatestOutput(){
  if(!activeScript)return;
  if(viewingRunId){restoreStream(viewingRunId);return;}
  try{
    const res=await api(`/scripts/${activeScript.id}/latest-run`);
    if(res.run_id){viewingRunId=res.run_id;restoreStream(res.run_id);}
  }catch(e){}
}

function appendTerm(term,text){
  term.textContent+=text;
  const lines=term.textContent.split('\n');
  if(lines.length>MAX_TERM_LINES){
    term.textContent=lines.slice(-MAX_TERM_LINES).join('\n');
  }
  term.scrollTop=term.scrollHeight;
}

function startStream(runId){
  if(streamSource){streamSource.close();}
  const term=document.getElementById('terminal');
  const st=document.getElementById('outputStatus');
  const sb=document.getElementById('stopBtn');
  if(!term)return;
  term.textContent='';
  if(st)st.innerHTML=`<span class="run-badge running">运行中</span> #${runId}`;
  if(sb)sb.style.display='';

  streamSource=new EventSource(`/api/runs/${runId}/stream`);
  streamSource.addEventListener('output',e=>{
    try{const txt=JSON.parse(e.data);appendTerm(term,txt);}catch(_){appendTerm(term,e.data+'\n');}
  });
  streamSource.addEventListener('done',e=>{
    let status;
    try{const d=JSON.parse(e.data);status=d.status;}catch(_){status=e.data;}
    if(st)st.innerHTML=`<span class="run-badge ${status}">${stxt(status)}</span> #${runId}`;
    if(sb)sb.style.display='none';
    streamSource.close();streamSource=null;loadScripts();
  });
  streamSource.onerror=()=>{if(streamSource){streamSource.close();streamSource=null;}if(sb)sb.style.display='none';};
}

async function restoreStream(runId){
  const run=await api(`/runs/${runId}`);
  const term=document.getElementById('terminal');
  const st=document.getElementById('outputStatus');
  const sb=document.getElementById('stopBtn');
  if(!term)return;
  const lines=(run.output||'').split('\n');
  term.textContent=lines.slice(-MAX_TERM_LINES).join('\n');
  term.scrollTop=term.scrollHeight;
  if(run.status==='running'){
    if(st)st.innerHTML=`<span class="run-badge running">运行中</span> #${runId}`;
    if(sb)sb.style.display='';
    streamSource=new EventSource(`/api/runs/${runId}/stream`);
    streamSource.addEventListener('output',e=>{
      try{const txt=JSON.parse(e.data);appendTerm(term,txt);}catch(_){appendTerm(term,e.data+'\n');}
    });
    streamSource.addEventListener('done',e=>{
      let status;try{const d=JSON.parse(e.data);status=d.status;}catch(_){status=e.data;}
      if(st)st.innerHTML=`<span class="run-badge ${status}">${stxt(status)}</span> #${runId}`;
      if(sb)sb.style.display='none';streamSource.close();streamSource=null;loadScripts();
    });
    streamSource.onerror=()=>{if(streamSource){streamSource.close();streamSource=null;}if(sb)sb.style.display='none';};
  }else{
    if(st)st.innerHTML=`<span class="run-badge ${run.status}">${stxt(run.status)}</span> #${runId}`;
    if(sb)sb.style.display='none';
  }
}

async function stopCurrentRun(){
  if(!viewingRunId){
    // Find running run from script list
    const s=scripts.find(x=>activeScript&&x.id===activeScript.id);
    if(!s)return;
  }
  if(viewingRunId) await api(`/runs/${viewingRunId}/stop`,{method:'POST'});
}

async function deleteScript(){
  if(!confirm(`确认删除 ${activeScript.name}？`))return;
  await api(`/scripts/${activeScript.id}`,{method:'DELETE'});
  activeScript=null;
  document.getElementById('mainArea').innerHTML='<div class="empty" style="height:100%"><p>已删除</p></div>';
  loadScripts();
}

// --- Modal ---
let editingScript=null;
function showNewModal(){editingScript=null;document.getElementById('modalTitle').textContent='新建脚本';document.getElementById('modalName').value='';document.getElementById('modalDesc').value='';document.getElementById('modalSubmit').textContent='创建';document.getElementById('modal').style.display='';document.getElementById('modalName').focus();}
function showEditModal(){editingScript=activeScript;document.getElementById('modalTitle').textContent='编辑信息';document.getElementById('modalName').value=activeScript.name;document.getElementById('modalDesc').value=activeScript.description||'';document.getElementById('modalSubmit').textContent='保存';document.getElementById('modal').style.display='';}
function closeModal(){document.getElementById('modal').style.display='none';}
async function submitModal(){
  const name=document.getElementById('modalName').value.trim();
  const desc=document.getElementById('modalDesc').value.trim();
  if(!name){alert('请输入名称');return;}
  if(editingScript){
    await api(`/scripts/${editingScript.id}`,{method:'PUT',body:{name,description:desc,content:activeScript.content}});
    closeModal();await selectScript(editingScript.id);loadScripts();
  }else{
    const res=await api('/scripts',{method:'POST',body:{name,description:desc,content:'# '+name+'\nprint("Hello from '+name+'")\n'}});
    if(res.error){alert(res.error);return;}
    closeModal();await loadScripts();selectScript(res.id);
  }
}

// --- Web Terminal (xterm.js) ---
function cleanupXterm(){
  if(xtermWS){try{xtermWS.close();}catch(e){}xtermWS=null;}
  if(xtermObj){xtermObj.dispose();xtermObj=null;}
  fitAddon=null;
}

function showTerminal(){
  activeScript=null;if(streamSource){streamSource.close();streamSource=null;}
  renderScriptList();
  const a=document.getElementById('mainArea');
  a.innerHTML=`
    <div class="main-header">
      <div class="title">🖥️ 终端</div>
      <button class="btn btn-sm" onclick="reconnectTerminal()">↻ 重连</button>
    </div>
    <div style="flex:1;padding:10px 16px;display:flex;flex-direction:column;min-height:0">
      <div id="xtermContainer" class="xterm-wrap"></div>
    </div>`;
  initXterm();
}

function initXterm(){
  cleanupXterm();
  // Ensure xterm CSS is loaded
  if(!document.getElementById('xterm-css')){
    const link=document.createElement('link');
    link.id='xterm-css';link.rel='stylesheet';
    link.href='https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css';
    document.head.appendChild(link);
  }
  const container=document.getElementById('xtermContainer');
  if(!container)return;

  xtermObj=new Terminal({
    cursorBlink:true,
    fontSize:13,
    fontFamily:"'SF Mono',SFMono-Regular,ui-monospace,'DejaVu Sans Mono',Menlo,Consolas,monospace",
    theme:{
      background:'#000',
      foreground:'#d4d4d4',
      cursor:'#d4d4d4'
    },
    allowProposedApi:true
  });
  fitAddon=new FitAddon.FitAddon();
  xtermObj.loadAddon(fitAddon);
  xtermObj.open(container);
  setTimeout(()=>fitAddon.fit(),50);

  // WebSocket
  const proto=location.protocol==='https:'?'wss:':'ws:';
  xtermWS=new WebSocket(`${proto}//${location.host}/api/terminal`);
  xtermWS.binaryType='arraybuffer';

  xtermWS.onopen=()=>{
    // Send initial size
    const cols=xtermObj.cols,rows=xtermObj.rows;
    xtermObj.focus();
  };

  xtermWS.onmessage=(ev)=>{
    if(ev.data instanceof ArrayBuffer){
      xtermObj.write(new Uint8Array(ev.data));
    }else{
      xtermObj.write(ev.data);
    }
  };

  xtermWS.onclose=()=>{
    xtermObj.write('\r\n\x1b[31m[连接已断开]\x1b[0m\r\n');
  };

  xtermWS.onerror=()=>{
    xtermObj.write('\r\n\x1b[31m[连接错误]\x1b[0m\r\n');
  };

  xtermObj.onData((data)=>{
    if(xtermWS&&xtermWS.readyState===WebSocket.OPEN){
      xtermWS.send(data);
    }
  });

  // Handle resize
  const resizeObs=new ResizeObserver(()=>{
    if(fitAddon)try{fitAddon.fit();}catch(e){}
  });
  resizeObs.observe(container);
}

function reconnectTerminal(){
  initXterm();
}

// --- Pip ---
let pipPackages=[],pipFilter='',pipRunId=null,pipStream=null;

async function showPipManager(){
  activeScript=null;if(streamSource){streamSource.close();streamSource=null;}
  cleanupXterm();
  renderScriptList();
  document.getElementById('mainArea').innerHTML=`
    <div class="main-header"><div class="title">📦 pip 包管理</div></div>
    <div class="tab-content" id="pipContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="pip-bar">
        <input id="pipInstallInput" placeholder="输入包名，如: requests flask" onkeydown="if(event.key==='Enter')pipInstall()">
        <button class="btn btn-primary btn-sm" onclick="pipInstall()">安装</button>
      </div>
      <div id="pipOutput" style="display:none;flex-shrink:0;margin-bottom:8px">
        <div style="margin-bottom:4px;display:flex;align-items:center;gap:6px">
          <span id="pipStatus" style="font-size:12px;color:var(--text2)"></span>
          <button class="btn btn-sm btn-danger" id="pipStopBtn" style="display:none" onclick="pipStop()">停止</button>
        </div>
        <div class="terminal" id="pipTerminal" style="max-height:150px;flex:none"></div>
      </div>
      <div style="margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-shrink:0">
        <input id="pipFilterInput" placeholder="🔍 搜索包..." style="flex:1;padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none" oninput="pipFilter=this.value.toLowerCase();renderPipTable()">
        <button class="btn btn-sm" onclick="loadPipList()">↻</button>
        <span class="pkg-count" id="pipCount"></span>
      </div>
      <div style="flex:1;overflow:auto;min-height:0" id="pipTableWrap"></div>
    </div>`;
  loadPipList();
}

async function loadPipList(){try{pipPackages=await api('/pip/list');}catch(e){pipPackages=[];}renderPipTable();}

function renderPipTable(){
  const w=document.getElementById('pipTableWrap'),c=document.getElementById('pipCount');
  if(!w)return;
  const f=pipPackages.filter(p=>!pipFilter||p.name.toLowerCase().includes(pipFilter)||(p.version||'').includes(pipFilter));
  if(c)c.textContent=`${f.length}/${pipPackages.length}`;
  if(!f.length){w.innerHTML=`<div style="color:var(--text2);text-align:center;padding:16px;font-size:12px">${pipFilter?'无匹配':'无包'}</div>`;return;}
  w.innerHTML=`<table class="pkg-table"><thead><tr><th>包名</th><th>版本</th><th></th></tr></thead><tbody>${f.map(p=>`<tr><td style="font-family:var(--font)">${esc(p.name)}</td><td style="color:var(--text2)">${esc(p.version)}</td><td style="text-align:right"><button class="btn btn-sm btn-danger" onclick="pipUninstall('${esc(p.name)}')" style="padding:1px 6px;font-size:10px">卸载</button></td></tr>`).join('')}</tbody></table>`;
}

async function pipInstall(){const i=document.getElementById('pipInstallInput'),p=i.value.trim();if(!p)return;const r=await api('/pip/install',{method:'POST',body:{packages:p}});if(r.error){alert(r.error);return;}i.value='';pipRunId=r.run_id;pipStartStream(r.run_id,'安装中');}
async function pipUninstall(n){if(!confirm(`卸载 ${n}？`))return;const r=await api('/pip/uninstall',{method:'POST',body:{packages:n}});if(r.error){alert(r.error);return;}pipRunId=r.run_id;pipStartStream(r.run_id,'卸载中');}

function pipStartStream(runId,label){
  if(pipStream){pipStream.close();}
  const o=document.getElementById('pipOutput'),t=document.getElementById('pipTerminal'),s=document.getElementById('pipStatus'),b=document.getElementById('pipStopBtn');
  if(!o||!t)return;o.style.display='';t.textContent='';
  if(s)s.innerHTML=`<span class="run-badge running">${label}</span> #${runId}`;
  if(b)b.style.display='';
  pipStream=new EventSource(`/api/runs/${runId}/stream`);
  pipStream.addEventListener('output',e=>{try{appendTerm(t,JSON.parse(e.data));}catch(_){appendTerm(t,e.data+'\n');}});
  pipStream.addEventListener('done',e=>{
    let status;try{const d=JSON.parse(e.data);status=d.status;}catch(_){status=e.data;}
    if(s)s.innerHTML=`<span class="run-badge ${status}">${stxt(status)}</span> #${runId}`;
    if(b)b.style.display='none';pipStream.close();pipStream=null;setTimeout(loadPipList,500);
  });
  pipStream.onerror=()=>{if(pipStream){pipStream.close();pipStream=null;}if(b)b.style.display='none';};
}
async function pipStop(){if(!pipRunId)return;await api(`/runs/${pipRunId}/stop`,{method:'POST'});}

// --- Auth ---
async function checkAuth(){
  try{const r=await fetch('/api/auth/check'),d=await r.json();authEnabled=d.auth_enabled;(!d.auth_enabled||d.authenticated)?showApp():showLogin();}catch(e){showApp();}
}
function showLogin(){document.getElementById('loginPage').style.display='';document.getElementById('app').style.display='none';setTimeout(()=>document.getElementById('loginUser').focus(),100);}
function showApp(){document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='';document.getElementById('logoutBtn').style.display=authEnabled?'':'none';loadScripts();}
async function doLogin(){
  const u=document.getElementById('loginUser').value,p=document.getElementById('loginPass').value,e=document.getElementById('loginError');e.style.display='none';
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});r.ok?showApp():(e.style.display='');}catch(_){e.textContent='网络错误';e.style.display='';}
}
async function doLogout(){await fetch('/api/logout',{method:'POST'});location.reload();}

function showToast(m){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:16px;right:16px;background:var(--green);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;z-index:200';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1500);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

checkAuth();
